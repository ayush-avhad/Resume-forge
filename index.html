<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResumeForge – Professional Resume Builder</title>
  <meta name="description" content="Build stunning resumes with 4 professional templates." />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0b1121; font-family: 'Segoe UI', system-ui, sans-serif; color: #f1f5f9; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0b1121; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    input, textarea { font-family: inherit; }
    input:focus, textarea:focus { outline: none; border-color: #6c63ff !important; }
    input::placeholder, textarea::placeholder { color: #475569; }
    @media print {
      body * { visibility: hidden; }
      #resume-preview, #resume-preview * { visibility: visible; }
      #resume-preview { position: fixed; top: 0; left: 0; width: 100%; box-shadow: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef } = React;

    const TEMPLATES = {
      classic:   { name: "Classic",   preview: "#1a1a2e", accent: "#e94560", bg: "#ffffff", font: "'Georgia', serif" },
      modern:    { name: "Modern",    preview: "#0f3460", accent: "#00b4d8", bg: "#f8fafc", font: "'Trebuchet MS', sans-serif" },
      minimal:   { name: "Minimal",   preview: "#2d2d2d", accent: "#6c63ff", bg: "#ffffff", font: "'Palatino Linotype', serif" },
      executive: { name: "Executive", preview: "#1b4332", accent: "#40916c", bg: "#f9f7f3", font: "'Book Antiqua', serif" },
    };

    const defaultData = {
      name: "Alex Johnson", title: "Senior Product Designer",
      photo: null, email: "alex@example.com", phone: "+1 (555) 123-4567",
      location: "San Francisco, CA", website: "alexjohnson.io",
      summary: "Creative and detail-oriented designer with 8+ years of experience crafting intuitive digital experiences. Passionate about solving complex problems through elegant, user-centered design.",
      experience: [
        { id: 1, role: "Senior Product Designer", company: "TechCorp Inc.", period: "2020 – Present", desc: "Led end-to-end design for flagship mobile app with 2M+ users. Grew design system from 40 to 200+ components. Reduced user onboarding drop-off by 35%." },
        { id: 2, role: "UX Designer", company: "Creative Studio", period: "2017 – 2020", desc: "Delivered 20+ client projects across fintech, healthcare, and e-commerce. Conducted user research and usability testing sessions." },
      ],
      education: [{ id: 1, degree: "B.S. Interaction Design", school: "California Institute of the Arts", period: "2013 – 2017" }],
      skills: ["Figma", "Prototyping", "User Research", "Design Systems", "HTML/CSS", "React"],
      projects: [{ id: 1, name: "HealthTrack App", role: "Lead Designer", period: "2022", desc: "Designed an award-winning health monitoring app that reached #1 in the App Store wellness category with 500K downloads in first month.", link: "healthtrack.io" }],
      certifications: [
        { id: 1, name: "Google UX Design Certificate", issuer: "Google / Coursera", date: "2021", credentialId: "GGL-UX-2021-AJ" },
        { id: 2, name: "Certified Usability Analyst (CUA)", issuer: "Human Factors International", date: "2019", credentialId: "" },
      ],
      awards: [
        { id: 1, title: "Design Excellence Award", org: "AIGA San Francisco", year: "2023", desc: "Recognized for outstanding contribution to digital product design in the Bay Area tech community." },
        { id: 2, title: "Best Mobile UX", org: "Webby Awards", year: "2022", desc: "HealthTrack app won Best Mobile UX in the Health & Fitness category." },
      ],
    };

    const makeUpdater = (setData, key) => (id, field, val) =>
      setData(d => ({ ...d, [key]: d[key].map(item => item.id === id ? { ...item, [field]: val } : item) }));
    const makeAdder = (setData, key, blank) => () =>
      setData(d => ({ ...d, [key]: [...d[key], { id: Date.now(), ...blank }] }));
    const makeRemover = (setData, key) => (id) =>
      setData(d => ({ ...d, [key]: d[key].filter(item => item.id !== id) }));

    function InputField({ label, value, onChange, multiline, placeholder }) {
      return (
        <div style={{ marginBottom: 12 }}>
          <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 4 }}>{label}</label>
          {multiline
            ? <textarea value={value} onChange={e => onChange(e.target.value)} rows={3} placeholder={placeholder}
                style={{ width: "100%", padding: "8px 10px", background: "#1e293b", border: "1px solid #334155", borderRadius: 6, color: "#f1f5f9", fontSize: 13, resize: "vertical", fontFamily: "inherit", boxSizing: "border-box" }} />
            : <input value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
                style={{ width: "100%", padding: "8px 10px", background: "#1e293b", border: "1px solid #334155", borderRadius: 6, color: "#f1f5f9", fontSize: 13, fontFamily: "inherit", boxSizing: "border-box" }} />
          }
        </div>
      );
    }

    function CardWrap({ children, onRemove }) {
      return (
        <div style={{ background: "#172033", border: "1px solid #1e293b", borderRadius: 8, padding: 14, marginBottom: 12, position: "relative" }}>
          <button onClick={onRemove} style={{ position: "absolute", top: 8, right: 8, background: "#dc2626", border: "none", color: "#fff", borderRadius: 4, width: 22, height: 22, cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center" }}>×</button>
          {children}
        </div>
      );
    }

    function AddBtn({ onClick, label }) {
      return <button onClick={onClick} style={{ width: "100%", padding: 10, borderRadius: 8, border: "2px dashed #334155", background: "transparent", color: "#64748b", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>{label}</button>;
    }

    function Section({ title, accent, children }) {
      return (
        <div style={{ marginBottom: 26 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 14 }}>
            <div style={{ fontSize: 11, fontWeight: 800, textTransform: "uppercase", letterSpacing: 2, color: accent, whiteSpace: "nowrap" }}>{title}</div>
            <div style={{ flex: 1, height: 1, background: accent, opacity: 0.3 }} />
          </div>
          {children}
        </div>
      );
    }

    function SideSection({ title, accent, children }) {
      return (
        <div style={{ marginBottom: 26 }}>
          <div style={{ fontSize: 11, fontWeight: 800, textTransform: "uppercase", letterSpacing: 2, color: accent, marginBottom: 12, paddingBottom: 6, borderBottom: `2px solid ${accent}` }}>{title}</div>
          {children}
        </div>
      );
    }

    function ResumePreview({ data, template }) {
      const t = TEMPLATES[template];

      const Avatar = () => (
        <div style={{ width: 76, height: 76, borderRadius: template === "modern" ? 12 : "50%", background: t.accent, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, fontWeight: 700, color: "#fff", flexShrink: 0, overflow: "hidden", border: data.photo ? `3px solid rgba(255,255,255,0.3)` : "none" }}>
          {data.photo ? <img src={data.photo} alt="Profile" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : data.name.split(" ").map(n => n[0]).join("").slice(0, 2)}
        </div>
      );

      const mainCol = (
        <div style={{ padding: "32px 40px" }}>
          {data.summary && (
            <Section title="Profile" accent={t.accent}>
              <p style={{ fontSize: 13.5, lineHeight: 1.7, color: "#374151", margin: 0 }}>{data.summary}</p>
            </Section>
          )}
          {data.experience.length > 0 && (
            <Section title="Experience" accent={t.accent}>
              {data.experience.map(exp => (
                <div key={exp.id} style={{ marginBottom: 20 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 2 }}>
                    <div style={{ fontWeight: 700, fontSize: 14 }}>{exp.role}</div>
                    <div style={{ fontSize: 12, color: t.accent, fontWeight: 600 }}>{exp.period}</div>
                  </div>
                  <div style={{ fontSize: 12.5, color: t.accent, marginBottom: 6, fontWeight: 600 }}>{exp.company}</div>
                  <div style={{ fontSize: 13, color: "#4b5563", lineHeight: 1.6 }}>{exp.desc}</div>
                </div>
              ))}
            </Section>
          )}
          {data.projects.length > 0 && (
            <Section title="Projects" accent={t.accent}>
              {data.projects.map(p => (
                <div key={p.id} style={{ marginBottom: 18 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 2 }}>
                    <div style={{ fontWeight: 700, fontSize: 14 }}>{p.name}</div>
                    <div style={{ fontSize: 12, color: t.accent, fontWeight: 600 }}>{p.period}</div>
                  </div>
                  {p.role && <div style={{ fontSize: 12.5, color: t.accent, marginBottom: 4, fontWeight: 600 }}>{p.role}</div>}
                  <div style={{ fontSize: 13, color: "#4b5563", lineHeight: 1.6 }}>{p.desc}</div>
                  {p.link && <div style={{ fontSize: 12, color: t.accent, marginTop: 4, fontStyle: "italic" }}>🔗 {p.link}</div>}
                </div>
              ))}
            </Section>
          )}
          {data.awards.length > 0 && (
            <Section title="Awards & Honors" accent={t.accent}>
              {data.awards.map(a => (
                <div key={a.id} style={{ marginBottom: 16, display: "flex", gap: 12, alignItems: "flex-start" }}>
                  <div style={{ marginTop: 2, fontSize: 16, flexShrink: 0 }}>🏆</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
                      <div style={{ fontWeight: 700, fontSize: 14 }}>{a.title}</div>
                      <div style={{ fontSize: 12, color: t.accent, fontWeight: 600 }}>{a.year}</div>
                    </div>
                    <div style={{ fontSize: 12.5, color: t.accent, marginBottom: 4, fontWeight: 600 }}>{a.org}</div>
                    {a.desc && <div style={{ fontSize: 13, color: "#4b5563", lineHeight: 1.6 }}>{a.desc}</div>}
                  </div>
                </div>
              ))}
            </Section>
          )}
        </div>
      );

      const sideCol = (
        <div style={{ background: template === "modern" ? "#f0f9ff" : template === "executive" ? "#f0fdf4" : "#fafafa", borderLeft: `1px solid ${template === "minimal" ? "#e5e7eb" : "transparent"}`, padding: "32px 28px" }}>
          {data.skills.length > 0 && (
            <SideSection title="Skills" accent={t.accent}>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {data.skills.map((skill, i) => (
                  <span key={i} style={{ background: t.accent, color: "#fff", borderRadius: 20, padding: "4px 12px", fontSize: 12, fontWeight: 600 }}>{skill}</span>
                ))}
              </div>
            </SideSection>
          )}
          {data.education.length > 0 && (
            <SideSection title="Education" accent={t.accent}>
              {data.education.map(edu => (
                <div key={edu.id} style={{ marginBottom: 14 }}>
                  <div style={{ fontWeight: 700, fontSize: 13 }}>{edu.degree}</div>
                  <div style={{ fontSize: 12, color: t.accent, fontWeight: 600 }}>{edu.school}</div>
                  <div style={{ fontSize: 11.5, color: "#6b7280" }}>{edu.period}</div>
                </div>
              ))}
            </SideSection>
          )}
          {data.certifications.length > 0 && (
            <SideSection title="Certifications & Licenses" accent={t.accent}>
              {data.certifications.map(c => (
                <div key={c.id} style={{ marginBottom: 14, display: "flex", gap: 8, alignItems: "flex-start" }}>
                  <span style={{ fontSize: 14, marginTop: 1, flexShrink: 0 }}>📜</span>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 13, lineHeight: 1.3 }}>{c.name}</div>
                    <div style={{ fontSize: 12, color: t.accent, fontWeight: 600 }}>{c.issuer}</div>
                    <div style={{ fontSize: 11.5, color: "#6b7280" }}>{c.date}{c.credentialId ? ` · ID: ${c.credentialId}` : ""}</div>
                  </div>
                </div>
              ))}
            </SideSection>
          )}
        </div>
      );

      const classicBottom = (
        <div style={{ padding: "0 40px 32px", display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 28 }}>
          <div>
            <SideSection title="Education" accent={t.accent}>
              {data.education.map(edu => (
                <div key={edu.id} style={{ marginBottom: 12 }}>
                  <div style={{ fontWeight: 700, fontSize: 13 }}>{edu.degree}</div>
                  <div style={{ fontSize: 12, color: t.accent }}>{edu.school} — {edu.period}</div>
                </div>
              ))}
            </SideSection>
          </div>
          <div>
            <SideSection title="Skills" accent={t.accent}>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                {data.skills.map((skill, i) => <span key={i} style={{ background: t.accent, color: "#fff", borderRadius: 4, padding: "3px 10px", fontSize: 12 }}>{skill}</span>)}
              </div>
            </SideSection>
          </div>
          <div>
            <SideSection title="Certifications" accent={t.accent}>
              {data.certifications.map(c => (
                <div key={c.id} style={{ marginBottom: 10 }}>
                  <div style={{ fontWeight: 700, fontSize: 12 }}>📜 {c.name}</div>
                  <div style={{ fontSize: 11.5, color: t.accent }}>{c.issuer} · {c.date}</div>
                </div>
              ))}
            </SideSection>
          </div>
        </div>
      );

      return (
        <div id="resume-preview" style={{ background: t.bg, fontFamily: t.font, width: "100%", minHeight: 900, boxShadow: "0 20px 60px rgba(0,0,0,0.3)", borderRadius: 2, overflow: "hidden", color: "#1a1a1a" }}>
          {/* Header */}
          <div style={{ background: template === "minimal" ? "#fff" : template === "executive" ? "#1b4332" : t.preview, color: template === "minimal" ? "#1a1a1a" : "#fff", padding: template === "minimal" ? "36px 40px 24px" : "40px 48px", borderBottom: template === "minimal" ? `4px solid ${t.accent}` : "none", display: "flex", alignItems: "center", gap: 28 }}>
            {/* Avatar / Photo */}
            {template === "minimal"
              ? data.photo && <div style={{ width: 80, height: 80, borderRadius: "50%", overflow: "hidden", flexShrink: 0, border: `3px solid ${t.accent}` }}><img src={data.photo} alt="Profile" style={{ width: "100%", height: "100%", objectFit: "cover" }} /></div>
              : <Avatar />
            }
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: template === "minimal" ? 36 : 30, fontWeight: 700, letterSpacing: -0.5, marginBottom: 4 }}>{data.name}</div>
              <div style={{ fontSize: 14, opacity: template === "minimal" ? 1 : 0.85, color: template === "minimal" ? t.accent : undefined, fontStyle: template === "classic" ? "italic" : "normal", fontWeight: template === "minimal" ? 600 : 400 }}>{data.title}</div>
            </div>
            <div style={{ fontSize: 12, opacity: template === "minimal" ? 1 : 0.82, textAlign: "right", lineHeight: 1.9 }}>
              <div>{data.email}</div>
              <div>{data.phone}</div>
              <div>{data.location}</div>
              {data.website && <div style={{ color: template === "minimal" ? t.accent : undefined }}>{data.website}</div>}
            </div>
          </div>
          {/* Body */}
          {template === "classic"
            ? <>{mainCol}{classicBottom}</>
            : <div style={{ display: "grid", gridTemplateColumns: "1fr 280px" }}>{mainCol}{sideCol}</div>
          }
        </div>
      );
    }

    function App() {
      const [data, setData] = useState(defaultData);
      const [template, setTemplate] = useState("modern");
      const [tab, setTab] = useState("personal");
      const [preview, setPreview] = useState(false);
      const fileInputRef = useRef();

      const set = key => val => setData(d => ({ ...d, [key]: val }));

      const handlePhotoUpload = e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => setData(d => ({ ...d, photo: ev.target.result }));
        reader.readAsDataURL(file);
      };

      const updateExp = makeUpdater(setData, "experience");
      const addExp    = makeAdder(setData, "experience", { role: "", company: "", period: "", desc: "" });
      const removeExp = makeRemover(setData, "experience");

      const updateEdu = makeUpdater(setData, "education");
      const addEdu    = makeAdder(setData, "education", { degree: "", school: "", period: "" });
      const removeEdu = makeRemover(setData, "education");

      const updateProject = makeUpdater(setData, "projects");
      const addProject    = makeAdder(setData, "projects", { name: "", role: "", period: "", desc: "", link: "" });
      const removeProject = makeRemover(setData, "projects");

      const updateCert = makeUpdater(setData, "certifications");
      const addCert    = makeAdder(setData, "certifications", { name: "", issuer: "", date: "", credentialId: "" });
      const removeCert = makeRemover(setData, "certifications");

      const updateAward = makeUpdater(setData, "awards");
      const addAward    = makeAdder(setData, "awards", { title: "", org: "", year: "", desc: "" });
      const removeAward = makeRemover(setData, "awards");

      const handleSkillsChange = val =>
        setData(d => ({ ...d, skills: val.split(",").map(s => s.trim()).filter(Boolean) }));

      const tabs = ["personal","experience","projects","education","skills","certs","awards"];
      const tabLabels = { personal:"Personal", experience:"Experience", projects:"Projects", education:"Education", skills:"Skills", certs:"Certs", awards:"Awards" };

      return (
        <div style={{ minHeight: "100vh", background: "#0b1121" }}>
          {/* Top Bar */}
          <div style={{ background: "#0f172a", borderBottom: "1px solid #1e293b", padding: "14px 32px", display: "flex", alignItems: "center", justifyContent: "space-between", position: "sticky", top: 0, zIndex: 100 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ width: 32, height: 32, borderRadius: 8, background: "linear-gradient(135deg,#6c63ff,#00b4d8)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>📄</div>
              <span style={{ fontWeight: 700, fontSize: 18, letterSpacing: -0.5 }}>ResumeForge</span>
              <span style={{ fontSize: 11, color: "#64748b", background: "#1e293b", borderRadius: 12, padding: "2px 8px" }}>BETA</span>
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setPreview(!preview)} style={{ padding: "8px 18px", borderRadius: 8, border: "1px solid #334155", background: preview ? "#6c63ff" : "transparent", color: "#f1f5f9", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>
                {preview ? "✏️ Edit" : "👁 Preview"}
              </button>
              <button onClick={() => window.print()} style={{ padding: "8px 18px", borderRadius: 8, border: "none", background: "linear-gradient(135deg,#6c63ff,#00b4d8)", color: "#fff", cursor: "pointer", fontSize: 13, fontWeight: 600 }}>
                ⬇ Download PDF
              </button>
            </div>
          </div>

          <div style={{ display: "flex", height: "calc(100vh - 61px)", overflow: "hidden" }}>
            {/* Sidebar Editor */}
            {!preview && (
              <div style={{ width: 340, background: "#0f172a", borderRight: "1px solid #1e293b", overflowY: "auto", flexShrink: 0 }}>
                {/* Templates */}
                <div style={{ padding: "20px 20px 14px" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#64748b", textTransform: "uppercase", letterSpacing: 1.2, marginBottom: 10 }}>Template</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                    {Object.entries(TEMPLATES).map(([key, t]) => (
                      <button key={key} onClick={() => setTemplate(key)} style={{ border: template === key ? "2px solid #6c63ff" : "2px solid #1e293b", borderRadius: 8, padding: "10px 8px", cursor: "pointer", background: template === key ? "#1a1f35" : "#172033", display: "flex", alignItems: "center", gap: 8 }}>
                        <div style={{ width: 18, height: 22, borderRadius: 3, background: t.preview, flexShrink: 0, position: "relative", overflow: "hidden" }}>
                          <div style={{ position: "absolute", top: 4, left: 3, right: 3, height: 2, background: t.accent, borderRadius: 2 }} />
                          <div style={{ position: "absolute", top: 8, left: 3, right: 5, height: 1, background: "rgba(255,255,255,0.3)", borderRadius: 2 }} />
                          <div style={{ position: "absolute", top: 11, left: 3, right: 7, height: 1, background: "rgba(255,255,255,0.2)", borderRadius: 2 }} />
                        </div>
                        <span style={{ fontSize: 12, fontWeight: 600, color: template === key ? "#c4b5fd" : "#94a3b8" }}>{t.name}</span>
                      </button>
                    ))}
                  </div>
                </div>

                <div style={{ height: 1, background: "#1e293b", margin: "0 20px" }} />

                {/* Tabs */}
                <div style={{ display: "flex", padding: "14px 20px 0", gap: 4, flexWrap: "wrap" }}>
                  {tabs.map(t => (
                    <button key={t} onClick={() => setTab(t)} style={{ padding: "6px 10px", borderRadius: 6, border: "none", background: tab === t ? "#6c63ff" : "#1e293b", color: tab === t ? "#fff" : "#94a3b8", cursor: "pointer", fontSize: 11, fontWeight: 600, marginBottom: 4 }}>
                      {tabLabels[t]}
                    </button>
                  ))}
                </div>

                <div style={{ padding: 20 }}>
                  {/* PERSONAL */}
                  {tab === "personal" && <>
                    {/* Photo Upload */}
                    <div style={{ marginBottom: 18 }}>
                      <label style={{ display: "block", fontSize: 11, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>Profile Photo</label>
                      <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                        <div style={{ width: 64, height: 64, borderRadius: "50%", background: data.photo ? "transparent" : "#1e293b", border: `2px solid ${data.photo ? "#6c63ff" : "#334155"}`, overflow: "hidden", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                          {data.photo ? <img src={data.photo} alt="Preview" style={{ width: "100%", height: "100%", objectFit: "cover" }} /> : <span style={{ fontSize: 26 }}>👤</span>}
                        </div>
                        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                          <label style={{ padding: "7px 14px", background: "#6c63ff", color: "#fff", borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: 600, display: "inline-block" }}>
                            {data.photo ? "Change Photo" : "Upload Photo"}
                            <input type="file" accept="image/*" onChange={handlePhotoUpload} style={{ display: "none" }} />
                          </label>
                          {data.photo && <button onClick={() => setData(d => ({ ...d, photo: null }))} style={{ padding: "6px 14px", background: "transparent", border: "1px solid #ef4444", color: "#ef4444", borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: 600 }}>Remove</button>}
                        </div>
                      </div>
                    </div>
                    <InputField label="Full Name" value={data.name} onChange={set("name")} />
                    <InputField label="Job Title" value={data.title} onChange={set("title")} />
                    <InputField label="Email" value={data.email} onChange={set("email")} />
                    <InputField label="Phone" value={data.phone} onChange={set("phone")} />
                    <InputField label="Location" value={data.location} onChange={set("location")} />
                    <InputField label="Website" value={data.website} onChange={set("website")} />
                    <InputField label="Profile Summary" value={data.summary} onChange={set("summary")} multiline />
                  </>}

                  {/* EXPERIENCE */}
                  {tab === "experience" && <>
                    {data.experience.map(exp => (
                      <CardWrap key={exp.id} onRemove={() => removeExp(exp.id)}>
                        <InputField label="Job Title" value={exp.role} onChange={v => updateExp(exp.id, "role", v)} />
                        <InputField label="Company" value={exp.company} onChange={v => updateExp(exp.id, "company", v)} />
                        <InputField label="Period" value={exp.period} onChange={v => updateExp(exp.id, "period", v)} placeholder="e.g. 2020 – Present" />
                        <InputField label="Description" value={exp.desc} onChange={v => updateExp(exp.id, "desc", v)} multiline />
                      </CardWrap>
                    ))}
                    <AddBtn onClick={addExp} label="+ Add Experience" />
                  </>}

                  {/* PROJECTS */}
                  {tab === "projects" && <>
                    <div style={{ fontSize: 12, color: "#64748b", marginBottom: 12, lineHeight: 1.6 }}>Showcase personal, academic, or open-source projects.</div>
                    {data.projects.map(p => (
                      <CardWrap key={p.id} onRemove={() => removeProject(p.id)}>
                        <InputField label="Project Name" value={p.name} onChange={v => updateProject(p.id, "name", v)} />
                        <InputField label="Your Role" value={p.role} onChange={v => updateProject(p.id, "role", v)} placeholder="e.g. Lead Developer" />
                        <InputField label="Period / Year" value={p.period} onChange={v => updateProject(p.id, "period", v)} placeholder="e.g. 2023" />
                        <InputField label="Description" value={p.desc} onChange={v => updateProject(p.id, "desc", v)} multiline />
                        <InputField label="Link (optional)" value={p.link} onChange={v => updateProject(p.id, "link", v)} placeholder="e.g. github.com/user/project" />
                      </CardWrap>
                    ))}
                    <AddBtn onClick={addProject} label="+ Add Project" />
                  </>}

                  {/* EDUCATION */}
                  {tab === "education" && <>
                    {data.education.map(edu => (
                      <CardWrap key={edu.id} onRemove={() => removeEdu(edu.id)}>
                        <InputField label="Degree / Program" value={edu.degree} onChange={v => updateEdu(edu.id, "degree", v)} />
                        <InputField label="Institution" value={edu.school} onChange={v => updateEdu(edu.id, "school", v)} />
                        <InputField label="Year" value={edu.period} onChange={v => updateEdu(edu.id, "period", v)} placeholder="e.g. 2017 – 2021" />
                      </CardWrap>
                    ))}
                    <AddBtn onClick={addEdu} label="+ Add Education" />
                  </>}

                  {/* SKILLS */}
                  {tab === "skills" && (
                    <div>
                      <InputField label="Skills (comma-separated)" value={data.skills.join(", ")} onChange={handleSkillsChange} multiline />
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 8 }}>
                        {data.skills.map((s, i) => <span key={i} style={{ background: TEMPLATES[template].accent, color: "#fff", borderRadius: 20, padding: "4px 12px", fontSize: 12, fontWeight: 600 }}>{s}</span>)}
                      </div>
                    </div>
                  )}

                  {/* CERTIFICATIONS */}
                  {tab === "certs" && <>
                    <div style={{ fontSize: 12, color: "#64748b", marginBottom: 12, lineHeight: 1.6 }}>Add professional certifications, licenses, or credentials.</div>
                    {data.certifications.map(c => (
                      <CardWrap key={c.id} onRemove={() => removeCert(c.id)}>
                        <InputField label="Certification Name" value={c.name} onChange={v => updateCert(c.id, "name", v)} placeholder="e.g. AWS Solutions Architect" />
                        <InputField label="Issuing Organization" value={c.issuer} onChange={v => updateCert(c.id, "issuer", v)} placeholder="e.g. Amazon Web Services" />
                        <InputField label="Date Issued" value={c.date} onChange={v => updateCert(c.id, "date", v)} placeholder="e.g. March 2023" />
                        <InputField label="Credential ID (optional)" value={c.credentialId} onChange={v => updateCert(c.id, "credentialId", v)} placeholder="e.g. ABC-12345" />
                      </CardWrap>
                    ))}
                    <AddBtn onClick={addCert} label="+ Add Certification" />
                  </>}

                  {/* AWARDS */}
                  {tab === "awards" && <>
                    <div style={{ fontSize: 12, color: "#64748b", marginBottom: 12, lineHeight: 1.6 }}>Highlight awards, honors, scholarships, or recognition.</div>
                    {data.awards.map(a => (
                      <CardWrap key={a.id} onRemove={() => removeAward(a.id)}>
                        <InputField label="Award / Honor Title" value={a.title} onChange={v => updateAward(a.id, "title", v)} placeholder="e.g. Employee of the Year" />
                        <InputField label="Awarding Organization" value={a.org} onChange={v => updateAward(a.id, "org", v)} placeholder="e.g. Google" />
                        <InputField label="Year" value={a.year} onChange={v => updateAward(a.id, "year", v)} placeholder="e.g. 2023" />
                        <InputField label="Description (optional)" value={a.desc} onChange={v => updateAward(a.id, "desc", v)} multiline placeholder="Brief context about this award..." />
                      </CardWrap>
                    ))}
                    <AddBtn onClick={addAward} label="+ Add Award" />
                  </>}
                </div>
              </div>
            )}

            {/* Resume Preview */}
            <div style={{ flex: 1, overflowY: "auto", padding: preview ? "40px 60px" : "32px 40px", background: "#0b1121" }}>
              <div style={{ maxWidth: 780, margin: "0 auto" }}>
                <ResumePreview data={data} template={template} />
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
